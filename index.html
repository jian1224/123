<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google-site-verification" content="MmdgKjiGkh2kaJpG8hJqVp4lptqJK7gdpAF1c1JbhFc" />
    
    <title>🏆 BEYBLADE X 大賽管理系統 v18.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #bef264; 
            --accent-orange: #f97316;
            --border-color: #334155;
            --canvas-bg: #e2e8f0;
            --match-bg: #ffffff;
            --line-color: #94a3b8;
            --line-thick: 2px;
        }

        body { font-family: 'Segoe UI', Microsoft JhengHei, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; background: var(--card-bg); padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { font-size: 38px; letter-spacing: 2px; margin: 0; color: var(--text-main); font-weight: 900; text-align: center; }
        .subtitle { color: var(--text-muted); font-size: 14px; letter-spacing: 4px; margin-top: 5px; text-align: center; margin-bottom: 25px;}
        h2 { color: var(--accent); border-left: 5px solid var(--accent); padding-left: 12px; font-size: 20px; margin: 15px 0; }
        .section { margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid var(--border-color); }
        
        input[type="text"], input[type="number"], select { padding: 12px 16px; background: #0f172a; color: #fff; border: 1px solid var(--border-color); border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { padding: 11px 22px; border-radius: 8px; border: none; font-size: 15px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:hover { background: #d9f99d; }
        .btn-cyan { background: #38bdf8; color: #000; }
        .btn-secondary { background: #475569; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-success { background: var(--accent-orange); color: white; width: 100%; font-size: 18px; padding: 14px; margin-top: 15px; }

        .setup-control-bar { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; align-items: center; background: #0f172a; padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); margin: 20px 0; }
        .control-group { display: flex; align-items: center; gap: 8px; }
        ul { list-style: none; padding: 0; max-width: 500px; margin: 15px auto; max-height: 300px; overflow-y: auto; background: #0f172a; border-radius: 8px; border: 1px solid #2d3748; padding: 5px; }
        li { background: #1e293b; margin: 4px 0; padding: 8px 15px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border-color); }

        /* 👑 置頂控制列 (桌面版預設) */
        .fixed-control-panel { position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 1400px; z-index: 999; background: #0f172a; border: 3px solid var(--accent-orange); border-top: none; padding: 15px 25px; border-radius: 0 0 16px 16px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.9); box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; }
        
        /* 桌面版舒適間距 */
        .scoring-zone { flex-grow: 1; display: flex; justify-content: center; align-items: center; gap: 20px; }
        .match-label { font-weight: bold; color: var(--accent-orange); font-size: 18px; white-space: nowrap; }
        .player-name-disp { font-size: 20px; font-weight: bold; color: #fff; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .vs-text { font-weight: bold; color: var(--text-muted); font-size: 16px; }
        .score-input { width: 70px; padding: 8px; font-size: 22px; text-align: center; background: #1e293b; color: #fff; border: 2px solid var(--border-color); border-radius: 8px; font-weight: bold; }
        .submit-btn { padding: 10px 24px; font-size: 16px; white-space: nowrap; }
        .spacer { width: 100px; } /* 左側返回鍵的對稱配重塊 */
        
        .pad-top { padding-top: 90px; }

        /* 對戰方塊樣式 */
        .match-box { background: var(--match-bg); border: 1px solid #94a3b8; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 220px; position: relative; z-index: 2; }
        .match-box.active { border: 3px solid var(--accent-orange); box-shadow: 0 0 15px rgba(249,115,22,0.6); transform: scale(1.05); z-index: 10; transition: 0.2s; }
        .player-row { display: flex; align-items: center; height: 34px; font-size: 14px; font-weight: bold; color: #1e293b; border-bottom: 1px solid #e2e8f0; }
        .player-row:last-child { border-bottom: none; }
        .player-row.winner { background: #f0fdf4; color: #16a34a; }
        .player-row.bye { color: #94a3b8; font-style: italic; }
        .player-name { flex-grow: 1; padding: 0 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .player-score { background: #cbd5e1; width: 35px; height: 100%; display: flex; justify-content: center; align-items: center; font-size: 16px; font-weight: 900; }
        .seed-box { background: var(--accent); color: #000; font-weight: 900; width: 30px; height: 100%; display: flex; justify-content: center; align-items: center; font-size: 14px; }
        .seed-box.empty { background: #cbd5e1; }

        /* 雙翼模式 */
        .double-canvas { background: var(--canvas-bg); padding: 40px; border-radius: 12px; display: flex; justify-content: space-between; align-items: stretch; min-width: 1100px; position: relative; overflow-x: auto; }
        .wing { display: flex; width: 350px; justify-content: space-between; position: relative; }
        .col-outer, .col-inner { display: flex; flex-direction: column; justify-content: space-around; position: relative; }
        .col-outer { height: 400px; }
        .col-inner { height: 200px; margin-top: 100px; }
        .center-stage { display: flex; flex-direction: column; align-items: center; justify-content: space-between; width: 300px; z-index: 5; }
        .trophy-sec { text-align: center; margin-bottom: 10px; }
        .trophy-title { font-weight: 900; font-size: 24px; color: #0f172a; letter-spacing: 2px; line-height: 1.2;}
        .trophy-sub { font-size: 14px; color: #475569; font-weight: bold; letter-spacing: 1px;}
        
        .left-wing .col-outer .match-box::after { content:''; position:absolute; right:-30px; top:50%; width:30px; border-top:var(--line-thick) solid var(--line-color); }
        .left-wing .col-inner::before { content:''; position:absolute; left:-30px; top:25%; bottom:25%; border-left:var(--line-thick) solid var(--line-color); border-top:var(--line-thick) solid var(--line-color); border-bottom:var(--line-thick) solid var(--line-color); width:30px; border-radius: 6px 0 0 6px; }
        .left-wing .col-inner .match-box::after { content:''; position:absolute; right:-40px; top:50%; width:40px; border-top:var(--line-thick) solid var(--line-color); }

        .right-wing { flex-direction: row-reverse; }
        .right-wing .player-row { flex-direction: row-reverse; }
        .right-wing .player-name { text-align: right; }
        .right-wing .col-outer .match-box::after { content:''; position:absolute; left:-30px; top:50%; width:30px; border-top:var(--line-thick) solid var(--line-color); }
        .right-wing .col-inner::before { content:''; position:absolute; right:-30px; top:25%; bottom:25%; border-right:var(--line-thick) solid var(--line-color); border-top:var(--line-thick) solid var(--line-color); border-bottom:var(--line-thick) solid var(--line-color); width:30px; border-radius: 0 6px 6px 0; }
        .right-wing .col-inner .match-box::after { content:''; position:absolute; left:-40px; top:50%; width:40px; border-top:var(--line-thick) solid var(--line-color); }

        .center-stage .final-match { position: relative; }
        .center-stage .final-match::before { content:''; position:absolute; left:-40px; top:50%; width:40px; border-top:var(--line-thick) solid var(--line-color); }
        .center-stage .final-match::after { content:''; position:absolute; right:-40px; top:50%; width:40px; border-top:var(--line-thick) solid var(--line-color); }

        .podium-box { margin-top: 20px; width: 220px; }
        .pod-row { display: flex; background: #0f172a; color: #fff; margin: 4px 0; transform: skewX(-15deg); overflow: hidden; border: 1px solid #fff; box-shadow: 2px 2px 0px rgba(0,0,0,0.2);}
        .pod-rank { background: #334155; color: var(--accent); padding: 5px 10px; font-weight: 900; font-size: 13px; width: 35px; text-align: center; }
        .pod-name { padding: 5px 10px; font-weight: bold; font-size: 13px; flex-grow: 1; transform: skewX(15deg); text-align: center; }

        /* 單翼無縫模式 */
        .single-canvas { background: var(--canvas-bg); padding: 40px; border-radius: 12px; overflow-x: auto; display: flex; align-items: center; min-height: 400px; }
        .tree-node { display: flex; align-items: center; position: relative; }
        .tree-children { display: flex; flex-direction: column; justify-content: center; position: relative; padding-right: 30px; }
        .tree-child-wrapper { position: relative; padding: 10px 0; display: flex; align-items: center; }
        
        .tree-children::after { content: ''; position: absolute; right: 15px; top: 25%; bottom: 25%; border-right: var(--line-thick) solid var(--line-color); }
        .tree-child-wrapper::after { content: ''; position: absolute; right: 0; top: 50%; width: 15px; border-top: var(--line-thick) solid var(--line-color); }
        .tree-parent { margin-left: 15px; position: relative; }
        .tree-parent::before { content: ''; position: absolute; left: -15px; top: 50%; width: 15px; border-top: var(--line-thick) solid var(--line-color); }

        .single-third-place { margin-left: 60px; padding-left: 40px; border-left: 2px dashed #94a3b8; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .hidden { display: none !important; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #0f172a; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid var(--border-color); }
        th { background-color: #1e293b; color: var(--accent); }

        /* ================== 👑 RWD 手機版變形黑科技 ================== */
        @media (max-width: 768px) {
            body { padding: 10px; }
            h1 { font-size: 28px; }
            
            /* 設定名單區塊改為直向堆疊 */
            .setup-control-bar { flex-direction: column; align-items: stretch; gap: 15px; }
            .control-group { width: 100%; border-left: none !important; padding-left: 0 !important; justify-content: space-between; }
            .control-group input { flex-grow: 1; margin-right: 10px; width: auto; }
            
            /* 計分板折疊成上下三層 */
            .fixed-control-panel { flex-direction: column; padding: 12px 15px !important; border-radius: 0 0 12px 12px !important; }
            .fixed-control-panel > button.btn-secondary { align-self: flex-start; margin-bottom: 5px; padding: 8px 12px; }
            
            .scoring-zone { flex-wrap: wrap; gap: 10px; width: 100%; }
            .match-label { width: 100%; text-align: center; margin-bottom: 2px; }
            
            .player-name-disp { max-width: 90px; font-size: 18px; }
            .score-input { width: 60px; height: 45px; font-size: 22px !important; padding: 5px; }
            
            .submit-btn { width: 100%; margin-top: 8px; padding: 15px !important; font-size: 18px; }
            .spacer { display: none; }
            
            /* 底下畫布再往下退，防遮擋 */
            .pad-top { padding-top: 190px; }
            
            /* 排行榜支援左右滑動 */
            #leaderboard-table { display: block; overflow-x: auto; white-space: nowrap; }
        }
    </style>
</head>
<body>

<div class="container" id="capture-area">
    <div id="main-header" class="nav-bar">
        <div>
            <h1>BEYBLADE X</h1>
            <div class="subtitle">ベイブレードエックス 賽事系統 v18.0</div>
        </div>
    </div>

    <div id="setup-section" class="section">
        <h2>1. 參賽選手設定</h2>
        
        <div class="setup-control-bar">
            <div class="control-group">
                <input type="text" id="manualInput" placeholder="手動輸入名字" onkeypress="if(event.key==='Enter') addManualPlayer()">
                <button class="btn-primary" onclick="addManualPlayer()">新增</button>
            </div>
            <div class="control-group" style="border-left: 2px solid var(--border-color); padding-left: 15px;">
                <input type="number" id="batchInput" placeholder="人數 (如: 64)" style="width: 100px;" min="2" max="128">
                <button class="btn-cyan" onclick="addBatchPlayers()">⚡ 一鍵生成</button>
            </div>
            <div class="control-group" style="border-left: 2px solid var(--border-color); padding-left: 15px;">
                <button class="btn-danger" onclick="clearAllPlayers()">🗑️ 清空名單</button>
            </div>
        </div>

        <div style="text-align: center; color: var(--text-muted); font-size: 14px; margin-bottom: 5px;">當前名單人數：<span id="player-count-display" style="color: var(--accent); font-weight: bold; font-size: 16px;">0</span> 人</div>
        <ul id="playerList"></ul>
        
        <div style="text-align: center; margin-top: 20px; background: #0f172a; padding: 20px; border-radius: 12px; border: 1px solid var(--border-color);">
            <select id="tournamentMode">
                <option value="elim-single">單翼淘汰賽 (緊密樹狀圖，不限人數)</option>
                <option value="elim-double">雙翼淘汰賽 (完美對稱，最多 8 人)</option>
                <option value="round-robin">輪流戰 (全循環積分制)</option>
            </select>
            <button class="btn-success" onclick="startTournament()">正式產生賽事 ➔</button>
        </div>
    </div>

    <div id="fixed-control" class="fixed-control-panel hidden" data-html2canvas-ignore>
        <button class="btn-secondary" onclick="backToMenu()">⬅ 返回選單</button>
        
        <div id="active-scoring-zone" class="scoring-zone">
            <span id="match-label" class="match-label">【當前對戰】</span>
            <span id="p1-name-disp" class="player-name-disp">-</span>
            <input type="number" id="p1-score-input" class="score-input" value="0" min="0">
            <span class="vs-text">VS</span>
            <input type="number" id="p2-score-input" class="score-input" value="0" min="0">
            <span id="p2-name-disp" class="player-name-disp">-</span>
            <button class="btn-primary submit-btn" onclick="submitGlobalResult()">確認比分</button>
        </div>
        
        <div id="finished-zone" class="hidden" style="flex-grow:1; text-align:center;">
            <span style="color:var(--accent); font-weight:bold; font-size:18px;">🎉 全賽程結束！請查看下方結算與下載海報！</span>
        </div>
        <div class="spacer"></div> 
    </div>

    <div id="arena-section" class="section hidden pad-top">
        <div id="double-wing-canvas" class="double-canvas hidden">
            <div class="wing left-wing">
                <div class="col-outer"><div id="m1-box"></div><div id="m2-box"></div></div>
                <div class="col-inner"><div id="m5-box"></div></div>
            </div>
            
            <div class="center-stage">
                <div class="trophy-sec">
                    <div style="font-size:40px; margin-bottom:-10px;">🏆</div>
                    <div class="trophy-title">BEYBLADE X</div>
                    <div class="trophy-sub">TOURNAMENT WINNER</div>
                </div>
                <div class="final-match" id="m7-box"></div>
                
                <div style="margin-top: 15px; display:flex; flex-direction:column; align-items:center;">
                    <div style="font-size:11px; font-weight:900; color:#475569; letter-spacing:1px; margin-bottom:2px;">3RD PLACE</div>
                    <div id="m8-box" style="transform: scale(0.9);"></div>
                </div>
                
                <div class="podium-box">
                    <div class="pod-row"><div class="pod-rank">1st</div><div class="pod-name" id="pod-1">-</div></div>
                    <div class="pod-row"><div class="pod-rank">2nd</div><div class="pod-name" id="pod-2">-</div></div>
                    <div class="pod-row"><div class="pod-rank">3rd</div><div class="pod-name" id="pod-3">-</div></div>
                    <div class="pod-row"><div class="pod-rank">4th</div><div class="pod-name" id="pod-4">-</div></div>
                </div>
            </div>

            <div class="wing right-wing">
                <div class="col-outer"><div id="m3-box"></div><div id="m4-box"></div></div>
                <div class="col-inner"><div id="m6-box"></div></div>
            </div>
        </div>

        <div id="single-wing-canvas" class="single-canvas hidden"></div>
        <div id="rr-canvas" class="hidden"></div>
    </div>

    <div id="leaderboard-section" class="section hidden">
        <h2>🏅 賽事戰績結算表</h2>
        <table id="leaderboard-table">
            <thead>
                <tr>
                    <th style="width: 70px;">名次</th>
                    <th>選手</th>
                    <th>勝場</th>
                    <th>負場</th>
                    <th>總得分</th>
                    <th>總失分</th>
                    <th>平均每場失分</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body"></tbody>
        </table>
        
        <div style="margin-top:25px; display:flex; gap:15px; flex-wrap: wrap;" data-html2canvas-ignore>
            <button class="btn-download" style="flex:2; padding:15px; width: 100%;" onclick="downloadTournamentImage()">📷 擷取下載對戰海報</button>
        </div>
    </div>
</div>

<script>
    // --- 系統資料 ---
    let players = [];
    let currentMode = '';
    
    let matchesList = [];
    let singleTreeRoot = null; 
    let thirdPlaceMatchNode = null;
    let currentActiveMatch = null;
    
    let rrMatches = [];
    let rrCurrentIndex = 0;

    function addManualPlayer() {
        const input = document.getElementById('manualInput');
        const name = input.value.trim();
        if (name) { players.push(createPlayerObj(name)); input.value = ''; renderPlayerList(); }
    }
    function addBatchPlayers() {
        const count = parseInt(document.getElementById('batchInput').value);
        if (isNaN(count) || count < 2) return alert("請輸入有效人數！");
        if (count > 128) return alert("單次上限128人！");
        let maxId = 0;
        players.forEach(p => { let m = p.name.match(/^選手\s*(\d+)$/); if(m && parseInt(m[1])>maxId) maxId=parseInt(m[1]); });
        for (let i = 1; i <= count; i++) players.push(createPlayerObj(`選手 ${maxId + i}`));
        document.getElementById('batchInput').value = ''; renderPlayerList();
    }
    function clearAllPlayers() {
        if (players.length > 0 && confirm("確定清空名單？")) { players = []; renderPlayerList(); }
    }
    function removePlayer(idx) { players.splice(idx, 1); renderPlayerList(); }
    function createPlayerObj(name) { return { name: name, wins: 0, losses: 0, scored: 0, lost: 0, played: 0 }; }
    function renderPlayerList() {
        const list = document.getElementById('playerList'); list.innerHTML = '';
        players.forEach((p, i) => list.innerHTML += `<li><span>${p.name}</span><button class="btn-danger" style="padding:4px 10px; font-size:12px;" onclick="removePlayer(${i})">刪除</button></li>`);
        document.getElementById('player-count-display').innerText = players.length;
    }

    function backToMenu() {
        document.getElementById('setup-section').classList.remove('hidden');
        document.getElementById('main-header').classList.remove('hidden');
        document.getElementById('fixed-control').classList.add('hidden');
        document.getElementById('arena-section').classList.add('hidden');
        document.getElementById('leaderboard-section').classList.add('hidden');
        window.scrollTo(0, 0);
    }

    function startTournament() {
        if (players.length < 2) return alert("至少需要 2 人！");
        currentMode = document.getElementById('tournamentMode').value;
        if (currentMode === 'elim-double' && players.length > 8) return alert("雙翼模式最多支援 8 人，請改選【單翼淘汰賽】！");

        players.forEach(p => { p.wins=0; p.losses=0; p.scored=0; p.lost=0; p.played=0; });
        matchesList = []; thirdPlaceMatchNode = null; currentActiveMatch = null;

        document.getElementById('setup-section').classList.add('hidden');
        document.getElementById('main-header').classList.add('hidden');
        
        document.getElementById('fixed-control').classList.remove('hidden');
        document.getElementById('active-scoring-zone').classList.remove('hidden');
        document.getElementById('finished-zone').classList.add('hidden');
        
        document.getElementById('arena-section').classList.remove('hidden');
        document.getElementById('double-wing-canvas').classList.add('hidden');
        document.getElementById('single-wing-canvas').classList.add('hidden');
        document.getElementById('rr-canvas').classList.add('hidden');

        if (currentMode === 'round-robin') {
            document.getElementById('rr-canvas').classList.remove('hidden');
            document.getElementById('leaderboard-section').classList.remove('hidden');
            initRoundRobin();
        } else if (currentMode === 'elim-double') {
            document.getElementById('double-wing-canvas').classList.remove('hidden');
            initDoubleWing();
        } else if (currentMode === 'elim-single') {
            document.getElementById('single-wing-canvas').classList.remove('hidden');
            initSingleWing();
        }
    }

    function createMatchNode(id, p1, p2) {
        let node = { id: id, p1: p1, p2: p2, s1: null, s2: null, winner: null, loser: null, isPlayed: false, nextNode: null, prevNodes: [], isThird: false };
        matchesList.push(node); return node;
    }

    function evalBye(node) {
        if(!node.isPlayed && node.p1 && node.p2) {
            if(node.p1.isBye && !node.p2.isBye) { node.winner = node.p2; node.loser = node.p1; node.isPlayed = true; }
            else if(node.p2.isBye && !node.p1.isBye) { node.winner = node.p1; node.loser = node.p2; node.isPlayed = true; }
            else if(node.p1.isBye && node.p2.isBye) { node.winner = {name:"空位", isBye:true}; node.isPlayed = true; }
        }
    }

    function syncTree() {
        matchesList.forEach(m => {
            if (m.isPlayed && m.winner && m.nextNode) {
                if (m.nextNode.prevNodes[0] === m) m.nextNode.p1 = m.winner;
                else if (m.nextNode.prevNodes[1] === m) m.nextNode.p2 = m.winner;
                evalBye(m.nextNode);
            }
        });
        
        if (thirdPlaceMatchNode && !thirdPlaceMatchNode.isPlayed) {
            let finals = currentMode === 'elim-double' ? matchesList[6] : singleTreeRoot;
            if (finals && finals.prevNodes.length === 2) {
                let s1 = finals.prevNodes[0]; let s2 = finals.prevNodes[1];
                if(s1.isPlayed) thirdPlaceMatchNode.p1 = s1.loser;
                if(s2.isPlayed) thirdPlaceMatchNode.p2 = s2.loser;
            }
        }
    }

    function findNextActiveMatch() {
        syncTree(); redrawArena();
        let found = null;
        if (thirdPlaceMatchNode && !thirdPlaceMatchNode.isPlayed && thirdPlaceMatchNode.p1 && thirdPlaceMatchNode.p2 && !thirdPlaceMatchNode.p1.isBye && !thirdPlaceMatchNode.p2.isBye) {
            found = thirdPlaceMatchNode;
        }
        if (!found) found = matchesList.find(m => !m.isThird && !m.isPlayed && m.p1 && m.p2 && !m.p1.isBye && !m.p2.isBye);

        if (found) {
            currentActiveMatch = found;
            document.getElementById('match-label').innerText = found.isThird ? "【季軍爭奪賽】" : "【當前對戰】";
            document.getElementById('p1-name-disp').innerText = found.p1.name;
            document.getElementById('p2-name-disp').innerText = found.p2.name;
            document.getElementById('p1-score-input').value = 0; document.getElementById('p2-score-input').value = 0;
            let box = document.getElementById(`mb-${found.id}`);
            if(box) { setTimeout(()=>{ box.classList.add('active'); box.scrollIntoView({behavior: 'smooth', block: 'center', inline: 'center'}); }, 50); }
        } else {
            document.getElementById('active-scoring-zone').classList.add('hidden');
            document.getElementById('finished-zone').classList.remove('hidden');
            document.getElementById('leaderboard-section').classList.remove('hidden');
            if (currentMode === 'elim-double') fillDoublePodium();
            updateLeaderboard();
        }
    }

    function submitGlobalResult() {
        if (currentMode === 'round-robin') { submitRRResult(); return; }

        const s1 = parseInt(document.getElementById('p1-score-input').value);
        const s2 = parseInt(document.getElementById('p2-score-input').value);
        if (isNaN(s1) || isNaN(s2) || s1 === s2) return alert("請輸入有效且不平手的得分！");

        let m = currentActiveMatch;
        m.s1 = s1; m.s2 = s2; m.isPlayed = true;
        m.p1.played++; m.p2.played++; m.p1.scored+=s1; m.p2.scored+=s2; m.p1.lost+=s2; m.p2.lost+=s1;

        if (s1 > s2) { m.winner = m.p1; m.loser = m.p2; m.p1.wins++; m.p2.losses++; }
        else { m.winner = m.p2; m.loser = m.p1; m.p2.wins++; m.p1.losses++; }
        
        findNextActiveMatch();
    }

    function renderMatchHTML(node, widthStr="220px", isCenter=false) {
        if(!node) return '';
        let s1Badge = node.seed1 ? `<div class="seed-box ${node.p1 && !node.p1.isBye ? '' : 'empty'}">${node.seed1}</div>` : '';
        let s2Badge = node.seed2 ? `<div class="seed-box ${node.p2 && !node.p2.isBye ? '' : 'empty'}">${node.seed2}</div>` : '';
        return `
            <div id="mb-${node.id}" class="match-box" style="width:${widthStr};">
                <div class="player-row ${node.winner===node.p1 ? 'winner':''} ${node.p1&&node.p1.isBye ? 'bye':''}">
                    ${s1Badge}<div class="player-name" style="${isCenter?'text-align:center;':''}">${node.p1?node.p1.name:'等待晉級...'}</div><div class="player-score">${node.s1!==null?node.s1:''}</div>
                </div>
                <div class="player-row ${node.winner===node.p2 ? 'winner':''} ${node.p2&&node.p2.isBye ? 'bye':''}">
                    ${s2Badge}<div class="player-name" style="${isCenter?'text-align:center;':''}">${node.p2?node.p2.name:'等待晉級...'}</div><div class="player-score">${node.s2!==null?node.s2:''}</div>
                </div>
            </div>
        `;
    }

    // ================== 模式一：雙翼對稱 ==================
    function initDoubleWing() {
        let shuffled = [...players].sort(()=>Math.random()-0.5);
        let byesCount = 8 - players.length; 
        
        let pairs = [];
        for (let i = 0; i < 4; i++) {
            let p1 = shuffled.pop();
            let p2 = (i < byesCount) ? {name: "輪空 (BYE)", isBye: true} : shuffled.pop();
            pairs.push([p1, p2]);
        }
        
        let m1 = createMatchNode('m1', pairs[0][0], pairs[0][1]); m1.seed1=1; m1.seed2=2;
        let m2 = createMatchNode('m2', pairs[1][0], pairs[1][1]); m2.seed1=3; m2.seed2=4;
        let m3 = createMatchNode('m3', pairs[2][0], pairs[2][1]); m3.seed1=5; m3.seed2=6;
        let m4 = createMatchNode('m4', pairs[3][0], pairs[3][1]); m4.seed1=7; m4.seed2=8;
        
        let m5 = createMatchNode('m5', null, null); m5.prevNodes=[m1,m2]; m1.nextNode=m5; m2.nextNode=m5;
        let m6 = createMatchNode('m6', null, null); m6.prevNodes=[m3,m4]; m3.nextNode=m6; m4.nextNode=m6;
        let m7 = createMatchNode('m7', null, null); m7.prevNodes=[m5,m6]; m5.nextNode=m7; m6.nextNode=m7;
        let m8 = createMatchNode('m8', null, null); m8.isThird = true; thirdPlaceMatchNode = m8;

        [m1,m2,m3,m4].forEach(evalBye);
        findNextActiveMatch();
    }
    
    function fillDoublePodium() {
        let m7 = matchesList[6]; let m8 = matchesList[7];
        document.getElementById('pod-1').innerText = m7.winner ? m7.winner.name : '-';
        document.getElementById('pod-2').innerText = m7.loser ? m7.loser.name : '-';
        document.getElementById('pod-3').innerText = m8.winner ? m8.winner.name : '-';
        document.getElementById('pod-4').innerText = m8.loser ? m8.loser.name : '-';
    }

    // ================== 模式二：單翼無限樹狀 ==================
    function initSingleWing() {
        let np = Math.pow(2, Math.ceil(Math.log2(players.length)));
        let numByes = np - players.length; 
        let shuffled = [...players].sort(()=>Math.random()-0.5);

        let currentLayer = [];
        for(let i=0; i<np/2; i++) {
            let p1 = shuffled.pop();
            let p2 = (i < numByes) ? {name: "輪空 (BYE)", isBye: true} : shuffled.pop();
            let n = createMatchNode(`s_${i}`, p1, p2);
            evalBye(n); 
            currentLayer.push(n);
        }

        let idCounter = np/2;
        while(currentLayer.length > 1) {
            let nextLayer = [];
            for(let i=0; i<currentLayer.length; i+=2) {
                let parent = createMatchNode(`s_${idCounter++}`, null, null);
                let c1 = currentLayer[i]; let c2 = currentLayer[i+1];
                parent.prevNodes = [c1, c2]; c1.nextNode = parent; c2.nextNode = parent;
                nextLayer.push(parent);
            }
            currentLayer = nextLayer;
        }
        singleTreeRoot = currentLayer[0];

        if(players.length >= 4) {
            thirdPlaceMatchNode = createMatchNode('s_third', null, null);
            thirdPlaceMatchNode.isThird = true;
        }
        findNextActiveMatch();
    }

    function buildFlexTreeHTML(node) {
        if (!node) return '';
        if (node.prevNodes.length === 0) return `<div class="tree-node tree-parent">${renderMatchHTML(node)}</div>`;
        
        let childHTML = `<div class="tree-children">`;
        childHTML += `<div class="tree-child-wrapper">${buildFlexTreeHTML(node.prevNodes[0])}</div>`;
        childHTML += `<div class="tree-child-wrapper">${buildFlexTreeHTML(node.prevNodes[1])}</div>`;
        childHTML += `</div>`;
        
        let parentHTML = `<div class="tree-node tree-parent">${renderMatchHTML(node)}</div>`;
        return `<div class="tree-node">${childHTML}${parentHTML}</div>`;
    }

    // ================== 共用 UI 更新 ==================
    function redrawArena() {
        document.querySelectorAll('.match-box').forEach(b => b.classList.remove('active'));
        
        if (currentMode === 'elim-double') {
            document.getElementById('m1-box').innerHTML = renderMatchHTML(matchesList[0]);
            document.getElementById('m2-box').innerHTML = renderMatchHTML(matchesList[1]);
            document.getElementById('m3-box').innerHTML = renderMatchHTML(matchesList[2]);
            document.getElementById('m4-box').innerHTML = renderMatchHTML(matchesList[3]);
            document.getElementById('m5-box').innerHTML = renderMatchHTML(matchesList[4]);
            document.getElementById('m6-box').innerHTML = renderMatchHTML(matchesList[5]);
            document.getElementById('m7-box').innerHTML = renderMatchHTML(matchesList[6], "220px", true);
            document.getElementById('m8-box').innerHTML = renderMatchHTML(matchesList[7], "220px", false);
        } else if (currentMode === 'elim-single') {
            let html = buildFlexTreeHTML(singleTreeRoot);
            if(thirdPlaceMatchNode) {
                html += `<div class="single-third-place"><div style="font-size:12px; font-weight:900; color:#475569; margin-bottom:5px;">3RD PLACE</div>${renderMatchHTML(thirdPlaceMatchNode)}</div>`;
            }
            document.getElementById('single-wing-canvas').innerHTML = html;
        }
    }

    // 核心排名邏輯
    function updateLeaderboard() {
        let rankScores = new Map();
        
        if (currentMode === 'elim-single' || currentMode === 'elim-double') {
            players.forEach(p => rankScores.set(p.name, p.wins)); 
            let finalsNode = (currentMode === 'elim-double') ? matchesList[6] : singleTreeRoot;
            let thirdNode = (currentMode === 'elim-double') ? matchesList[7] : thirdPlaceMatchNode;

            if (finalsNode && finalsNode.isPlayed) {
                if (finalsNode.winner) rankScores.set(finalsNode.winner.name, 10000);
                if (finalsNode.loser) rankScores.set(finalsNode.loser.name, 9000);
            }
            if (thirdNode && thirdNode.isPlayed) {
                if (thirdNode.winner) rankScores.set(thirdNode.winner.name, 8000);
                if (thirdNode.loser) rankScores.set(thirdNode.loser.name, 7000);
            }
        }

        let sorted = [...players].sort((a, b) => {
            if (currentMode === 'round-robin') {
                if (b.wins !== a.wins) return b.wins - a.wins;
                let aRate = a.played > 0 ? a.lost / a.played : 0;
                let bRate = b.played > 0 ? b.lost / b.played : 0;
                return aRate - bRate;
            } else {
                let scoreA = rankScores.get(a.name) || 0;
                let scoreB = rankScores.get(b.name) || 0;
                if (scoreB !== scoreA) return scoreB - scoreA;
                let aRate = a.played > 0 ? a.lost / a.played : 0;
                let bRate = b.played > 0 ? b.lost / b.played : 0;
                return aRate - bRate;
            }
        });

        const tbody = document.getElementById('leaderboard-body'); tbody.innerHTML = '';
        sorted.forEach((p, i) => {
            const avgLost = p.played > 0 ? (p.lost / p.played).toFixed(2) : "0.00";
            tbody.innerHTML += `<tr ${i===0&&p.played>0?'class="top-rank"':''}><td>${i+1}</td><td style="font-weight:bold;">${p.name}</td><td style="color:var(--accent); font-weight:bold;">${p.wins}</td><td style="color:#ef4444;">${p.losses}</td><td>${p.scored}</td><td>${p.lost}</td><td style="font-weight:bold; color:var(--accent-orange);">${avgLost}</td></tr>`;
        });
    }

    // ================== 輪流戰邏輯 ==================
    function initRoundRobin() {
        rrMatches = [];
        for (let i = 0; i < players.length; i++) { for (let j = i+1; j < players.length; j++) rrMatches.push({ p1: players[i], p2: players[j] }); }
        rrMatches.sort(() => Math.random() - 0.5); rrCurrentIndex = 0; loadRRMatch();
    }
    
    function loadRRMatch() {
        if (rrCurrentIndex >= rrMatches.length) {
            document.getElementById('active-scoring-zone').classList.add('hidden');
            document.getElementById('finished-zone').classList.remove('hidden');
            updateLeaderboard(); return;
        }
        const m = rrMatches[rrCurrentIndex];
        document.getElementById('match-label').innerText = `輪流戰 ${rrCurrentIndex + 1}/${rrMatches.length}`;
        document.getElementById('p1-name-disp').innerText = m.p1.name; 
        document.getElementById('p2-name-disp').innerText = m.p2.name;
        document.getElementById('p1-score-input').value = 0; 
        document.getElementById('p2-score-input').value = 0;
        updateLeaderboard();
    }

    function submitRRResult() {
        const s1 = parseInt(document.getElementById('p1-score-input').value); 
        const s2 = parseInt(document.getElementById('p2-score-input').value);
        if (isNaN(s1) || isNaN(s2) || s1 === s2) return alert("比分無效或不能平手！");
        
        const m = rrMatches[rrCurrentIndex];
        m.p1.played++; 
        m.p2.played++; 
        m.p1.scored += s1; 
        m.p2.scored += s2; 
        m.p1.lost += s2; 
        m.p2.lost += s1;
        
        if (s1 > s2) { 
            m.p1.wins++; 
            m.p2.losses++; 
        } else { 
            m.p2.wins++; 
            m.p1.losses++; 
        }
        rrCurrentIndex++; 
        loadRRMatch();
    }

    // ================== 手機截圖防壓縮黑科技 ==================
    function downloadTournamentImage() {
        const target = document.getElementById('capture-area');
        const sCanvas = document.getElementById('single-wing-canvas');
        const ctrl = document.getElementById('fixed-control');
        
        const osX = window.scrollX; const osY = window.scrollY;
        const ow = target.style.maxWidth; const oof = sCanvas.style.overflowX; const cDisp = ctrl.style.display;
        
        // 拍照前強迫網頁展開到電腦版的超大尺寸
        ctrl.style.display = 'none'; 
        target.style.maxWidth = 'none'; 
        target.style.width = '1400px'; 
        sCanvas.style.overflowX = 'visible';
        window.scrollTo(0, 0);
        
        setTimeout(() => {
            html2canvas(target, { backgroundColor: '#0f172a', scale: 2, logging: false, useCORS: true, width: 1400, height: target.scrollHeight, windowWidth: 1400, windowHeight: target.scrollHeight, x:0, y:0 })
            .then(canvas => {
                target.style.maxWidth = ow; target.style.width = 'auto'; sCanvas.style.overflowX = oof; ctrl.style.display = cDisp; window.scrollTo(osX, osY);
                let a = document.createElement('a'); a.download = `陀螺杯_賽事_${new Date().toISOString().slice(0,10)}.png`; a.href = canvas.toDataURL('image/png'); a.click();
            }).catch(e => {
                target.style.maxWidth = ow; target.style.width = 'auto'; sCanvas.style.overflowX = oof; ctrl.style.display = cDisp; window.scrollTo(osX, osY);
                alert("截圖失敗！");
            });
        }, 100); // 延遲 0.1 秒等畫面完全撐開
    }
</script>
